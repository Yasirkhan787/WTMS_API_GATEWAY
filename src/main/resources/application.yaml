server:
  port: 8760

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - AuthFilter

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/user/**
          filters:
            - StripPrefix=2
            - AuthFilter

        - id: fleet-service
          uri: lb://FLEET-SERVICE
          predicates:
            - Path=/api/v1/fleet/**
          filters:
            - StripPrefix=2
            - AuthFilter

        - id: schedule-service
          uri: lb://SCHEDULE-SERVICE
          predicates:
            - Path=/api/v1/schedule/**
          filters:
            - StripPrefix=2
            - AuthFilter

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notification/**
          filters:
            - StripPrefix=2
            - AuthFilter

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

